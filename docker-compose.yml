name: space-telemetry

services:
  exporter:
    build: .
    image: space-telemetry:local
    container_name: st-exporter
    volumes:
      - telemetry-data:/app/data                              # ephemeris + satellite/swpc cache (container-owned)
      - ./space-telemetry.example.yaml:/app/space-telemetry.yaml:ro  # config: edit & restart the exporter
    ports:
      - "9110:9110"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: st-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: st-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  telemetry-data:
  prometheus-data:
  grafana-data:
